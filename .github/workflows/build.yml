name: Build APK
on: [push]

jobs:
    build:
        name: Build and push
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-java@v3
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: "Setup Gradle"
              uses: gradle/gradle-build-action@v2

            - name: "Grant execution permission"
              run: chmod +x ./gradlew

            - name: "Build APKs"
              run: |
                  chmod +x ./gradlew
                  ./gradlew assembleDebug assembleRelease

            - name: "Setup directories"
              run: |
                  mkdir -p /tmp/pyonbuild/apks
                  mkdir -p /tmp/pyonbuild/tools

            - name: "Move debug APK"
              run: |
                  if [ -f ./app/build/outputs/apk/debug/app-debug.apk ]; then
                      mv ./app/build/outputs/apk/debug/app-debug.apk /tmp/pyonbuild/apks
                  else
                      echo "Debug APK not found."
                      exit 1
                  fi

            - name: "Move release APK"
              run: |
                  if [ -f ./app/build/outputs/apk/release/app-release.apk ]; then
                      cp ./app/build/outputs/apk/release/app-release.apk /tmp/pyonbuild/apks/app-release.apk
                  elif [ -f ./app/build/outputs/apk/release/app-release-unsigned.apk ]; then
                      cp ./app/build/outputs/apk/release/app-release-unsigned.apk /tmp/pyonbuild/apks/app-release.apk
                  else
                      echo "Release APK not found."
                      exit 1
                  fi

            - name: "Upload debug APK"
              uses: actions/upload-artifact@v4
              with:
                name: app-debug
                path: /tmp/pyonbuild/apks/app-debug.apk
                if-no-files-found: ignore

            - name: "Upload release APK"
              uses: actions/upload-artifact@v4
              with:
                name: app-release
                path: /tmp/pyonbuild/apks/app-release.apk
                if-no-files-found: ignore