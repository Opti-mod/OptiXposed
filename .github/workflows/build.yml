name: Build APK
on: [push]

jobs:
    build:
        name: Build and push
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-java@v3
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: "Setup Gradle"
              uses: gradle/gradle-build-action@v2

            - name: "Grant execution permission"
              run: chmod +x ./gradlew

            - name: "Build APKs"
              env:
                  KEYSTORE_BASE64: ${{ secrets.keystore }}
                  KEYSTORE_PASSWORD: ${{ secrets.keystore_password }}
                  KEY_ALIAS: ${{ secrets.key_alias }}
                  KEY_PASSWORD: ${{ secrets.key_password }}
              run: |
                  chmod +x ./gradlew
                  if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
                      printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/signing-key.jks"
                      ./gradlew assembleDebug assembleRelease \
                          -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/signing-key.jks" \
                          -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
                          -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
                          -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
                  else
                      echo "Signing secrets not configured; building debug APK only."
                      ./gradlew assembleDebug
                  fi

            - name: "Setup directories"
              run: |
                  mkdir -p /tmp/pyonbuild/apks
                  mkdir -p /tmp/pyonbuild/tools

            - name: "Move debug APK"
              run: |
                  if [ -f ./app/build/outputs/apk/debug/app-debug.apk ]; then
                      mv ./app/build/outputs/apk/debug/app-debug.apk /tmp/pyonbuild/apks
                  else
                      echo "Debug APK not found."
                      exit 1
                  fi

            - name: "Download uber-apk-signer"
              run: wget -nv "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.2.1/uber-apk-signer-1.2.1.jar" -O /tmp/pyonbuild/tools/uber-apk-signer.jar

            - name: "Sign release APK"
              if: ${{ hashFiles('app/build/outputs/apk/release/app-release-unsigned.apk') != '' }}
              run: java -jar /tmp/pyonbuild/tools/uber-apk-signer.jar --apks ./app/build/outputs/apk/release/app-release-unsigned.apk --out /tmp/pyonbuild/apks/

            - name: "Rename release APK"
              if: ${{ hashFiles('app/build/outputs/apk/release/app-release-unsigned.apk') != '' }}
              run: mv /tmp/pyonbuild/apks/app-release-aligned-debugSigned.apk /tmp/pyonbuild/apks/app-release.apk

            - name: "Upload debug APK"
              uses: actions/upload-artifact@v4
              with:
                name: app-debug
                path: /tmp/pyonbuild/apks/app-debug.apk
                if-no-files-found: ignore

            - name: "Upload release APK"
              uses: actions/upload-artifact@v4
              with:
                name: app-release
                path: /tmp/pyonbuild/apks/app-release.apk
                if-no-files-found: ignore