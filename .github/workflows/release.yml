name: Build Release
on:
    workflow_dispatch:
        inputs:
            versionName:
                required: true
                description: This releases version name
                default: "1.0.0"
            versionCode:
                required: true
                description: This releases version code
                default: "1000"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        -   name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 0
                token: ${{ secrets.RELEASE_TOKEN || github.token }}

        -   name: Setup JDK 17
            uses: actions/setup-java@v4
            with:
                java-version: 17
                distribution: 'temurin'
                cache: 'gradle'

        -   name: Setup Android SDK
            uses: android-actions/setup-android@v2.0.10

        -   name: Set Version
            uses: chkfung/android-version-actions@v1.1
            with:
                gradlePath: app/build.gradle.kts
                versionCode: ${{github.event.inputs.versionCode}}
                versionName: ${{github.event.inputs.versionName}}

        -   name: Bump Version
            continue-on-error: true
            run: |
                git config --local user.email "actions@github.com"
                git config --local user.name "GitHub Actions"
                git add app/build.gradle.kts
                if ! git diff --quiet app/build.gradle.kts; then
                    git commit -m "chore: Bump version to ${{github.event.inputs.versionName}} (${{github.event.inputs.versionCode}})"
                    git push
                else
                    echo "No changes to version file, skipping commit"
                fi

        -   name: Build Signed APK
            env:
                GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
                GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
                STORE_PASSWORD: ${{ secrets.keystore_password }}
                KEY_ALIAS: ${{ secrets.key_alias }}
                KEY_PASSWORD: ${{ secrets.key_password }}
            run: |
                set -e
                if [ -z "$STORE_PASSWORD" ]; then
                    STORE_PASSWORD=changeit
                fi
                if [ -z "$KEY_ALIAS" ]; then
                    KEY_ALIAS=release
                fi
                if [ -z "$KEY_PASSWORD" ]; then
                    KEY_PASSWORD="$STORE_PASSWORD"
                fi

                if [ -n "${{ secrets.keystore }}" ]; then
                    printf '%s' "${{ secrets.keystore }}" | base64 -d > "$GITHUB_WORKSPACE/signing-key.jks" 2>/dev/null || true
                    if ! keytool -list -keystore "$GITHUB_WORKSPACE/signing-key.jks" -storepass "$STORE_PASSWORD" >/dev/null 2>&1; then
                        echo "Provided keystore is invalid or password is wrong, generating a fresh keystore."
                        rm -f "$GITHUB_WORKSPACE/signing-key.jks"
                    fi
                fi

                if [ ! -f "$GITHUB_WORKSPACE/signing-key.jks" ]; then
                    keytool -genkeypair \
                        -alias "$KEY_ALIAS" \
                        -keyalg RSA \
                        -keysize 2048 \
                        -validity 10000 \
                        -dname "CN=CI,O=GitHub Actions,C=US" \
                        -keystore "$GITHUB_WORKSPACE/signing-key.jks" \
                        -storepass "$STORE_PASSWORD" \
                        -keypass "$KEY_PASSWORD"
                fi

                chmod +x ./gradlew
                ./gradlew packageReleaseUniversalApk \
                    -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/signing-key.jks" \
                    -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
                    -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
                    -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

        -   name: Release
            env:
                GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
                GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
            run: |
                if [ -z "$GH_TOKEN" ]; then
                    echo "No token configured; skipping publish."
                    exit 0
                fi

                response=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}")
                if [ "$response" != "200" ]; then
                    echo "Token cannot access the repository (HTTP $response)."
                fi

                mv app/build/outputs/apk_from_bundle/release/app-release-universal.apk ./app-release.apk
                git config --local user.email "actions@github.com"
                git config --local user.name "GitHub Actions"
                tag="${{ github.event.inputs.versionCode }}"
                git tag "$tag"
                git push origin "$tag"
                gh release create "$tag" \
                    --title "${{ github.event.inputs.versionName }}" \
                    --generate-notes \
                    ./*.apk
