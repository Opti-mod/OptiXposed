name: Build Release
on:
    workflow_dispatch:
        inputs:
            versionName:
                required: true
                description: This releases version name
                default: "1.0.0"
            versionCode:
                required: true
                description: This releases version code
                default: "1000"

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        -   name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 0
                token: ${{ secrets.RELEASE_TOKEN || github.token }}

        -   name: Setup JDK 17
            uses: actions/setup-java@v4
            with:
                java-version: 17
                distribution: 'temurin'
                cache: 'gradle'

        -   name: Setup Android SDK
            uses: android-actions/setup-android@v2.0.10

        -   name: Set Version
            uses: chkfung/android-version-actions@v1.1
            with:
                gradlePath: app/build.gradle.kts
                versionCode: ${{github.event.inputs.versionCode}}
                versionName: ${{github.event.inputs.versionName}}

        -   name: Bump Version
            continue-on-error: true
            run: |
                git config --local user.email "actions@github.com"
                git config --local user.name "GitHub Actions"
                git add app/build.gradle.kts
                if ! git diff --quiet app/build.gradle.kts; then
                    git commit -m "chore: Bump version to ${{github.event.inputs.versionName}} (${{github.event.inputs.versionCode}})"
                    git push
                else
                    echo "No changes to version file, skipping commit"
                fi

        -   name: Build Release APK
            env:
                GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
                GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
            run: |
                chmod +x ./gradlew
                ./gradlew assembleRelease

        -   name: Release
            env:
                GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
                GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
            run: |
                if [ -z "$GH_TOKEN" ]; then
                    echo "No token configured; skipping publish."
                    exit 0
                fi

                response=$(curl -sSL -o /dev/null -w '%{http_code}' -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}")
                if [ "$response" != "200" ]; then
                    echo "Token cannot access the repository (HTTP $response)."
                fi

                if [ -f app/build/outputs/apk/release/app-release.apk ]; then
                    mv app/build/outputs/apk/release/app-release.apk ./app-release.apk
                elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
                    mv app/build/outputs/apk/release/app-release-unsigned.apk ./app-release.apk
                else
                    echo "No release APK artifact was produced."
                    exit 1
                fi
                git config --local user.email "actions@github.com"
                git config --local user.name "GitHub Actions"
                tag="${{ github.event.inputs.versionCode }}"
                git tag "$tag"
                git push origin "$tag"
                gh release create "$tag" \
                    --title "${{ github.event.inputs.versionName }}" \
                    --generate-notes \
                    ./*.apk
